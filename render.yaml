# Infra-as-code para Render.
# Render lee este archivo automáticamente al crear un Blueprint.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: pensum-tracker-api
    runtime: python
    plan: free                       # Free tier (duerme tras 15 min inactivo)
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true                 # Re-deploy en cada push a main
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.4
      - key: CORS_ORIGINS
        sync: false                  # Se configura manualmente desde el dashboard
